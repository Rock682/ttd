<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TTD Auto Fill Pro</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 w-[400px] min-h-[500px]">
  <div class="p-4">
    <header class="flex items-center justify-between mb-6">
      <h1 class="text-xl font-bold text-orange-600 dark:text-orange-400">TTD Auto Fill Pro</h1>
      <div class="flex gap-2">
        <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-800 transition-colors">
          <svg id="sun-icon" class="w-5 h-5 hidden" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.464 5.05l-.707-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"></path></svg>
          <svg id="moon-icon" class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
        </button>
      </div>
    </header>

    <div id="main-view">
      <div class="flex justify-between items-center mb-4">
        <div class="flex items-center gap-2">
          <h2 class="text-sm font-semibold uppercase tracking-wider text-gray-500 dark:text-gray-400">Pilgrim Profiles</h2>
          <button id="clear-all-btn" class="text-[10px] font-bold text-red-500 hover:text-red-600 uppercase tracking-tighter hidden">Clear All</button>
        </div>
        <button id="add-pilgrim-btn" class="bg-orange-600 hover:bg-orange-700 text-white px-3 py-1.5 rounded-lg text-sm font-medium transition-colors flex items-center gap-1">
          <span>+</span> Add New
        </button>
      </div>

      <div id="pilgrim-list" class="space-y-3 max-h-[350px] overflow-y-auto pr-1">
        <!-- Pilgrim items will be injected here -->
      </div>

      <div id="empty-state" class="hidden text-center py-10">
        <p class="text-gray-500 dark:text-gray-400 italic">No pilgrims saved yet.</p>
      </div>

      <div class="mt-6 space-y-3">
        <div class="bg-gray-100 dark:bg-gray-800/50 p-3 rounded-xl border border-gray-200 dark:border-gray-800 space-y-2">
          <div class="flex items-center justify-between">
            <span class="text-xs font-bold text-gray-600 dark:text-gray-400 uppercase">Instant Auto-Fill</span>
            <label class="relative inline-flex items-center cursor-pointer" style="position: relative; display: inline-flex; align-items: center; cursor: pointer;">
              <input type="checkbox" id="instant-fill-toggle" class="sr-only peer">
              <div class="w-9 h-5 bg-gray-300 rounded-full peer dark:bg-gray-700 peer-checked:bg-orange-600 peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all" style="width: 36px; height: 20px; background: #d1d5db; border-radius: 999px; position: relative; transition: 0.3s;"></div>
            </label>
          </div>
          <div class="flex items-center justify-between">
            <span class="text-xs font-bold text-gray-600 dark:text-gray-400 uppercase">Auto-Continue</span>
            <label class="relative inline-flex items-center cursor-pointer" style="position: relative; display: inline-flex; align-items: center; cursor: pointer;">
              <input type="checkbox" id="auto-continue-toggle" class="sr-only peer">
              <div class="w-9 h-5 bg-gray-300 rounded-full peer dark:bg-gray-700 peer-checked:bg-orange-600 peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all" style="width: 36px; height: 20px; background: #d1d5db; border-radius: 999px; position: relative; transition: 0.3s;"></div>
            </label>
          </div>
          <div class="flex items-center justify-between">
            <div class="flex flex-col">
              <span class="text-xs font-bold text-gray-600 dark:text-gray-400 uppercase">Lite Mode (Speed Boost)</span>
              <span class="text-[8px] text-gray-400">Blocks non-essential images/scripts</span>
            </div>
            <label class="relative inline-flex items-center cursor-pointer" style="position: relative; display: inline-flex; align-items: center; cursor: pointer;">
              <input type="checkbox" id="lite-mode-toggle" class="sr-only peer">
              <div class="w-9 h-5 bg-gray-300 rounded-full peer dark:bg-gray-700 peer-checked:bg-orange-600 peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all" style="width: 36px; height: 20px; background: #d1d5db; border-radius: 999px; position: relative; transition: 0.3s;"></div>
            </label>
          </div>
          <div class="flex items-center justify-between">
            <div class="flex flex-col">
              <span class="text-xs font-bold text-gray-600 dark:text-gray-400 uppercase">TTD Dark Mode</span>
              <span class="text-[8px] text-gray-400">Easier on the eyes for night bookings</span>
            </div>
            <label class="relative inline-flex items-center cursor-pointer" style="position: relative; display: inline-flex; align-items: center; cursor: pointer;">
              <input type="checkbox" id="ttd-dark-mode-toggle" class="sr-only peer">
              <div class="w-9 h-5 bg-gray-300 rounded-full peer dark:bg-gray-700 peer-checked:bg-orange-600 peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all" style="width: 36px; height: 20px; background: #d1d5db; border-radius: 999px; position: relative; transition: 0.3s;"></div>
            </label>
          </div>
        </div>

        <button id="fill-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-bold text-lg shadow-lg shadow-blue-500/20 transition-all active:scale-95 flex items-center justify-center gap-2">
          <span>⚡</span> Fill Current Page
        </button>

        <button id="toggle-fab-btn" class="w-full bg-orange-100 dark:bg-orange-900/20 text-orange-600 dark:text-orange-400 py-2.5 rounded-xl font-bold text-sm border border-orange-200 dark:border-orange-800 transition-all active:scale-95 flex items-center justify-center gap-2">
          <span>🔘</span> Show Floating Button
        </button>
        
        <div class="flex gap-2">
          <button id="export-btn" class="flex-1 bg-gray-200 dark:bg-gray-800 hover:bg-gray-300 dark:hover:bg-gray-700 py-2 rounded-lg text-sm font-medium transition-colors">
            Export JSON
          </button>
          <button id="import-btn" class="flex-1 bg-gray-200 dark:bg-gray-800 hover:bg-gray-300 dark:hover:bg-gray-700 py-2 rounded-lg text-sm font-medium transition-colors">
            Import JSON
          </button>
          <input type="file" id="import-input" class="hidden" accept=".json">
        </div>
      </div>
    </div>

    <!-- Add/Edit Form View (Hidden by default) -->
    <div id="form-view" class="hidden">
      <div class="flex items-center gap-2 mb-6">
        <button id="back-btn" class="p-2 hover:bg-gray-200 dark:hover:bg-gray-800 rounded-lg transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
        </button>
        <h2 id="form-title" class="text-lg font-bold">Add Pilgrim</h2>
      </div>

      <form id="pilgrim-form" class="space-y-4">
        <input type="hidden" id="pilgrim-id">
        
        <div>
          <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Full Name</label>
          <input type="text" id="name" required class="w-full bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg px-3 py-2 focus:ring-2 focus:ring-orange-500 outline-none transition-all" placeholder="As per ID proof">
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Age</label>
            <input type="number" id="age" required min="1" max="120" class="w-full bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg px-3 py-2 focus:ring-2 focus:ring-orange-500 outline-none transition-all">
          </div>
          <div>
            <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Gender</label>
            <select id="gender" required class="w-full bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg px-3 py-2 focus:ring-2 focus:ring-orange-500 outline-none transition-all">
              <option value="Male">Male</option>
              <option value="Female">Female</option>
              <option value="Other">Other</option>
            </select>
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold text-gray-500 uppercase mb-1">ID Proof Type</label>
          <select id="idProofType" required class="w-full bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg px-3 py-2 focus:ring-2 focus:ring-orange-500 outline-none transition-all">
            <option value="Aadhaar Card">Aadhaar Card</option>
            <option value="Passport">Passport</option>
            <option value="PAN Card">PAN Card</option>
            <option value="Voter ID">Voter ID</option>
            <option value="Driving License">Driving License</option>
          </select>
        </div>

        <div>
          <label class="block text-xs font-bold text-gray-500 uppercase mb-1">ID Number</label>
          <input type="text" id="idNumber" required class="w-full bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-700 rounded-lg px-3 py-2 focus:ring-2 focus:ring-orange-500 outline-none transition-all" placeholder="Enter ID number">
        </div>

        <button type="submit" class="w-full bg-orange-600 hover:bg-orange-700 text-white py-3 rounded-xl font-bold transition-all active:scale-95">
          Save Profile
        </button>
      </form>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
